name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn lint
      - run: yarn test

      # npm — publish all MCP server packages with bundled @ask-llm/shared
      # Uses npm (not yarn) because yarn pack ignores bundledDependencies
      - name: Publish ask-gemini-mcp
        run: npm publish --access public
        working-directory: packages/gemini-mcp
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish ask-codex-mcp
        run: npm publish --access public
        working-directory: packages/codex-mcp
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish ask-ollama-mcp
        run: npm publish --access public
        working-directory: packages/ollama-mcp
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish ask-llm-mcp
        run: npm publish --access public
        working-directory: packages/llm-mcp
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      # Official MCP Registry — OIDC, no token needed
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Sync versions from tag to server.json files
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          for f in server.json packages/codex-mcp/server.json packages/ollama-mcp/server.json packages/llm-mcp/server.json; do
            jq --arg v "$VERSION" '(.version = $v) | (.packages[0].version = $v)' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done

      - run: ./mcp-publisher login github-oidc

      - name: Publish ask-gemini to MCP Registry
        run: ./mcp-publisher publish
        continue-on-error: true

      - name: Publish ask-codex to MCP Registry
        run: ./mcp-publisher publish --server-json packages/codex-mcp/server.json
        continue-on-error: true

      - name: Publish ask-ollama to MCP Registry
        run: ./mcp-publisher publish --server-json packages/ollama-mcp/server.json
        continue-on-error: true

      - name: Publish ask-llm to MCP Registry
        run: ./mcp-publisher publish --server-json packages/llm-mcp/server.json
        continue-on-error: true

      # GitHub Release with auto-generated changelog
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ github.token }}

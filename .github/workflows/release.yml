name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      # npm — Trusted Publisher OIDC, no token needed
      - name: Publish to npm
        run: npm publish --access public
        continue-on-error: true
        id: npm_publish

      # Official MCP Registry — OIDC, no token needed
      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Sync version from tag to server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '(.version = $v) | (.packages[0].version = $v)' server.json > server.tmp && mv server.tmp server.json

      - run: ./mcp-publisher login github-oidc
      - run: ./mcp-publisher publish
